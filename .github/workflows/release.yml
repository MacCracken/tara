name: Release

on:
  push:
    tags: ['*']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --all-features --target ${{ matrix.target }}
          else
            cargo build --release --all-features --target ${{ matrix.target }}
          fi

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "VERSION ($VERSION) does not match tag ($TAG)"
            exit 1
          fi
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  benchmark:
    name: Release Benchmarks
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: BENCH_SAMPLES=10 ./scripts/bench-history.sh
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: |
            bench-history.csv
            BENCHMARKS.md

  release:
    name: GitHub Release
    needs: [publish, benchmark]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: benchmarks
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bench-history.csv
            BENCHMARKS.md
